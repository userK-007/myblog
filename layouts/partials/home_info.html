{{- with site.Params.homeInfoParams }}
<article class="first-entry home-info">
    <div class="home-info-content">
        {{- if .imageUrl }}
        <div class="home-info-avatar">
            <img draggable="false" src="{{ .imageUrl | relURL }}" alt="{{ .imageTitle | default "profile image" }}" title="{{ .imageTitle }}" />
        </div>
        {{- end }}
        <div class="home-info-bio">
            <p class="home-info-subtitle">AI工程师</p>
        </div>
        <div class="home-info-links">
            {{- if .email }}
            <a href="mailto:{{ .email }}" class="home-info-link" title="Email">
                <span class="home-info-icon" aria-hidden="true">
                    <svg class="social-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </span>
                <span class="home-info-label">Email</span>
            </a>
            {{- end }}
            {{- if .git }}
            <a href="{{ .git }}" class="home-info-link" title="GitHub" target="_blank">
                <span class="home-info-icon" aria-hidden="true">
                    <svg class="social-icon social-icon-github" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                    </svg>
                </span>
                <span class="home-info-label">GitHub</span>
            </a>
            {{- end }}
            {{- if .telegram }}
            <a href="{{ .telegram }}" class="home-info-link" title="Telegram" target="_blank">
                <span class="home-info-icon" aria-hidden="true">
                    <svg class="social-icon social-icon-telegram" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 2L11 13"></path>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
                    </svg>
                </span>
                <span class="home-info-label">Telegram</span>
            </a>
            {{- end }}
            {{- if .x }}
            <a href="{{ .x }}" class="home-info-link" title="X平台" target="_blank">
                <span class="home-info-icon" aria-hidden="true">
                    <svg class="social-icon social-icon-x" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                    </svg>
                </span>
                <span class="home-info-label">X</span>
            </a>
            {{- end }}
        </div>
        <div class="home-info-about">
            {{- with site.GetPage "/about" -}}
            <a href="{{ .RelPermalink }}" class="button" title="关于我">
              <span class="button-inner">关于我</span>
            </a>
            {{- end -}}
        </div>
    </div>
</article>
{{- end -}}
