{{- $categories := .Site.Taxonomies.categories -}}

{{- if $categories -}}
<div class="right-sidebar">
  <h3>📚 分类导航</h3>

  {{- range $name, $terms := $categories -}}
  <div class="category-item">
    <a href="/categories/{{ $name | urlize }}/">{{ $name }}</a>
    <span class="count">({{ len $terms }})</span>
  </div>
  {{- end -}}
</div>
{{- end -}}
