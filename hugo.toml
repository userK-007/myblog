baseURL = 'https://yourusername.github.io/'
languageCode = 'zh-cn'
title = '柚子王的个人博客'
theme = 'PaperMod'

[params]
  env = 'production'
  title = '柚子王的个人博客'
  description = '技术、金融与狂人日记'
  keywords = ['博客', '技术', '金融', '随笔']
  author = 'Pomelo King'
  images = ['/logo.png']
  
  
  # 社交链接
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  
  # 评论系统 - Giscus
  comments = true
  
  [params.Comments.giscus]
    repo = "yourusername/your-repo"  # 替换为你的GitHub仓库
    repoId = "R_xxxxxxxxxx"  # 需要从Giscus获取
    category = "General"
    categoryId = "DIC_kwxxxxxxxxxx"  # 需要从Giscus获取
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "light"
  
  # 搜索功能
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# 菜单配置
[[menu.main]]
  identifier = 'tech'
  name = '技术'
  url = '/tech/'
  weight = 1

[[menu.main]]
  identifier = 'finance'
  name = '金融'
  url = '/finance/'
  weight = 2

[[menu.main]]
  identifier = 'madness'
  name = '狂人日记'
  url = '/madness/'
  weight = 3

[[menu.main]]
  identifier = 'tags'
  name = '标签'
  url = '/tags/'
  weight = 4

# 分类配置
[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

# Markup配置
[markup]
  [markup.highlight]
    style = 'github'
    lineNos = true
    lineNumbersInTable = true
    noClasses = false

# 输出格式
[outputs]
  home = ['HTML', 'RSS', 'JSON']
  page = ['HTML']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']
