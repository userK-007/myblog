baseURL = 'https://userK-007.github.io/myblog/'
languageCode = 'zh-cn'
title = 'userK-007的个人博客'
theme = 'PaperMod'
ignoreErrors = ['error-output-taxonomy']

[params]
  env = 'production'
  description = '技术、金融与狂人日记'
  mainSections = ['tech', 'finance', 'madness']
  keywords = ['博客', '技术', '金融', '随笔']
  author = 'userK-007'
  images = ['/logo.png']
  
  # 社交链接
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/userK-007"
  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/yourusername"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/yourusername"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:Chatgptlaoliu@proton.me"
  
  [params.profileMode]
    enabled = false

  # 首页信息
  [params.homeInfoParams]
    title = "userK-007"
    imageUrl = "blogAvatar.png"
    email = "Chatgptlaoliu@proton.me"
    git = "https://github.com/userK-007"
    telegram = "https://t.me/yourusername"
    x = "https://x.com/qiangdongl85523"
    aboutme = "/about/"
  
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true

  comments = true
  [params.Comments.giscus]
    repo = "userK-007/myblog"
    repoId = "R_xxxxxxxxxx"
    category = "General"
    categoryId = "DIC_kwxxxxxxxxxx"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 1
    limit = 20
    keys = ["title", "summary", "content"]

# 菜单配置
[[menu.main]]
  identifier = 'tech'
  name = '技术'
  url = '/tech/'
  weight = 1

[[menu.main]]
  identifier = 'finance'
  name = '金融'
  url = '/finance/'
  weight = 2

[[menu.main]]
  identifier = 'madness'
  name = '狂人日记'
  url = '/madness/'
  weight = 3

[[menu.main]]
  identifier = 'tags'
  name = '标签'
  url = '/tags/'
  weight = 4

[[menu.main]]
  identifier = 'search'
  name = '搜索'
  url = '/search/'
  weight = 5

# 分类配置
[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

# Markup配置
[markup]
  [markup.highlight]
    style = 'github'
    lineNos = true
    lineNumbersInTable = true
    noClasses = false

# 输出格式
[outputs]
  home = ['HTML', 'RSS', 'JSON']
  page = ['HTML']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']